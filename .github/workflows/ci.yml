name: CI

on:
  # push:
  #   branches: ["main", "feat/*", "fix/*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  GO_VERSION: "1.26"
  RUST_VERSION: "stable"

jobs:
  # Detect which components changed
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      authz-service: ${{ steps.filter.outputs.authz-service }}
      wasm-plugin: ${{ steps.filter.outputs.wasm-plugin }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            authz-service:
              - 'authz-service/**'
              - 'go.work'
              - 'go.work.sum'
            wasm-plugin:
              - 'wasm-plugin/**'
              - 'Cargo.toml'
            workflows:
              - '.github/workflows/**'

  # Check if wasm-plugin has a proper Rust project structure
  check-wasm:
    runs-on: ubuntu-latest
    outputs:
      has-cargo-toml: ${{ steps.check.outputs.has-cargo-toml }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for Cargo.toml
        id: check
        run: |
          if [ -f "wasm-plugin/Cargo.toml" ]; then
            echo "has-cargo-toml=true" >> $GITHUB_OUTPUT
          else
            echo "has-cargo-toml=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # Go Service: authz-service
  # ============================================
  authz-format:
    name: "Go: Format Check"
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.authz-service == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./authz-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: authz-service/go.sum

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files must be formatted with gofmt. Please run:"
            echo "  cd authz-service && make format"
            gofmt -l .
            exit 1
          fi

  authz-lint:
    name: "Go: Lint"
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.authz-service == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./authz-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: authz-service/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: authz-service
          args: --timeout=5m

  authz-vet:
    name: "Go: Vet"
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.authz-service == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./authz-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: authz-service/go.sum

      - name: Run go vet
        run: go vet ./...

  authz-test:
    name: "Go: Test"
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.authz-service == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./authz-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: authz-service/go.sum

      - name: Run tests with race detection
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./authz-service/coverage.out
          flags: authz-service
          fail_ci_if_error: false

  authz-build:
    name: "Go: Build Binaries"
    runs-on: ubuntu-latest
    needs: [authz-format, authz-lint, authz-vet, authz-test]
    if: |
      needs.changes.outputs.authz-service == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ./authz-service
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: authz-service/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -o bin/authz-service-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server
          ls -lh bin/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: authz-service-${{ matrix.goos }}-${{ matrix.goarch }}
          path: authz-service/bin/authz-service-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  authz-docker:
    name: "Go: Build Docker Image"
    runs-on: ubuntu-latest
    needs: [authz-format, authz-lint, authz-vet, authz-test]
    if: |
      needs.changes.outputs.authz-service == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./authz-service
          file: ./authz-service/Dockerfile
          push: false
          tags: authz-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================
  # Rust WASM Plugin: wasm-plugin
  # ============================================
  wasm-format:
    name: "Rust: Format Check"
    runs-on: ubuntu-latest
    needs: [changes, check-wasm]
    if: |
      needs.check-wasm.outputs.has-cargo-toml == 'true' && (
        needs.changes.outputs.wasm-plugin == 'true' ||
        needs.changes.outputs.workflows == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    defaults:
      run:
        working-directory: ./wasm-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  wasm-clippy:
    name: "Rust: Clippy"
    runs-on: ubuntu-latest
    needs: [changes, check-wasm]
    if: |
      needs.check-wasm.outputs.has-cargo-toml == 'true' && (
        needs.changes.outputs.wasm-plugin == 'true' ||
        needs.changes.outputs.workflows == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    defaults:
      run:
        working-directory: ./wasm-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  wasm-test:
    name: "Rust: Test"
    runs-on: ubuntu-latest
    needs: [changes, check-wasm]
    if: |
      needs.check-wasm.outputs.has-cargo-toml == 'true' && (
        needs.changes.outputs.wasm-plugin == 'true' ||
        needs.changes.outputs.workflows == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    defaults:
      run:
        working-directory: ./wasm-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Run tests
        run: cargo test --all-features

  wasm-build:
    name: "Rust: Build WASM"
    runs-on: ubuntu-latest
    needs: [check-wasm, wasm-format, wasm-clippy, wasm-test]
    if: |
      needs.check-wasm.outputs.has-cargo-toml == 'true' && (
        needs.changes.outputs.wasm-plugin == 'true' ||
        needs.changes.outputs.workflows == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    defaults:
      run:
        working-directory: ./wasm-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-wasip1

      - name: Build WASM binary
        run: cargo build --target wasm32-wasip1 --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-plugin
          path: wasm-plugin/target/wasm32-wasip1/release/*.wasm
          retention-days: 7

  # ============================================
  # Summary Job
  # ============================================
  ci-success:
    name: "CI Success"
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-wasm
      - authz-format
      - authz-lint
      - authz-vet
      - authz-test
      - authz-build
      - authz-docker
      - wasm-format
      - wasm-clippy
      - wasm-test
      - wasm-build
    if: always()
    steps:
      - name: Check all jobs
        run: |
          # Check if any required job failed
          # Note: skipped jobs are OK (e.g., WASM jobs when Cargo.toml doesn't exist)

          # Go service jobs - these should not be skipped
          if [[ "${{ needs.authz-format.result }}" == "failure" ]] || \
             [[ "${{ needs.authz-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.authz-vet.result }}" == "failure" ]] || \
             [[ "${{ needs.authz-test.result }}" == "failure" ]] || \
             [[ "${{ needs.authz-build.result }}" == "failure" ]] || \
             [[ "${{ needs.authz-docker.result }}" == "failure" ]]; then
            echo "❌ One or more Go service jobs failed"
            exit 1
          fi

          # WASM jobs - allow skipped (when Cargo.toml doesn't exist)
          if [[ "${{ needs.wasm-format.result }}" == "failure" ]] || \
             [[ "${{ needs.wasm-clippy.result }}" == "failure" ]] || \
             [[ "${{ needs.wasm-test.result }}" == "failure" ]] || \
             [[ "${{ needs.wasm-build.result }}" == "failure" ]]; then
            echo "❌ One or more WASM jobs failed"
            exit 1
          fi

          # Report status
          if [[ "${{ needs.check-wasm.outputs.has-cargo-toml }}" == "true" ]]; then
            echo "✅ All CI jobs passed successfully (Go + WASM)"
          else
            echo "✅ All Go CI jobs passed successfully (WASM skipped - no Cargo.toml found)"
          fi
