name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string

env:
  GO_VERSION: "1.26"
  RUST_VERSION: "stable"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/authz-service

permissions:
  contents: write
  packages: write

jobs:
  # Check if wasm-plugin has a proper Rust project structure
  check-wasm:
    runs-on: ubuntu-latest
    outputs:
      has-cargo-toml: ${{ steps.check.outputs.has-cargo-toml }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for Cargo.toml
        id: check
        run: |
          if [ -f "wasm-plugin/Cargo.toml" ]; then
            echo "has-cargo-toml=true" >> $GITHUB_OUTPUT
          else
            echo "has-cargo-toml=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # Build and Release Go Service
  # ============================================
  build-authz-service:
    name: Build authz-service
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: authz-service/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        working-directory: ./authz-service
        run: |
          mkdir -p bin
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o bin/authz-service-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/server

      - name: Create tarball
        working-directory: ./authz-service/bin
        run: |
          tar -czf authz-service-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            authz-service-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: authz-service-${{ matrix.goos }}-${{ matrix.goarch }}
          path: authz-service/bin/*.tar.gz

  # ============================================
  # Build Docker Image
  # ============================================
  build-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./authz-service
          file: ./authz-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Build WASM Plugin
  # ============================================
  build-wasm:
    name: Build WASM Plugin
    runs-on: ubuntu-latest
    needs: check-wasm
    if: needs.check-wasm.outputs.has-cargo-toml == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-wasip1

      - name: Build WASM
        working-directory: ./wasm-plugin
        run: cargo build --target wasm32-wasip1 --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-plugin
          path: wasm-plugin/target/wasm32-wasip1/release/*.wasm

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [check-wasm, build-authz-service, build-docker, build-wasm]
    if: always() && needs.build-authz-service.result == 'success' && needs.build-docker.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.wasm
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
